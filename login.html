<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recruit Now Singapore — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2F5496;--yellow:#FEE12B;--bg:#f4f6fb;--surface:#fff;
  --border:#e2e4ea;--text:#1a1d2e;--muted:#6b7280;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

.header{background:var(--blue);border-bottom:3px solid var(--yellow);padding:0 20px;height:54px;display:flex;align-items:center}
.logo{display:flex;align-items:center;gap:10px}
.logo-sub{color:rgba(255,255,255,0.7);font-size:11px}

.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.login-logo{text-align:center;margin-bottom:24px}
.login-sub{font-size:13px;color:var(--muted);margin-top:6px}
.login-title{font-size:19px;font-weight:600;color:var(--blue);margin-top:8px}

.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;background:#f9fafb;transition:border-color .15s}
.field input:focus{border-color:var(--blue);background:#fff}

.btn-primary{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.alert-error{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}

.footer{text-align:center;padding:16px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="https://ikrtujbbefdiierxfbbm.supabase.co/storage/v1/object/public/profiles/RN%20LOGO%20TRANSPARENT.png" alt="Recruit Now Singapore" style="height:34px;width:auto;object-fit:contain"/>
    <div class="logo-sub">Resume Processing Portal</div>
  </div>
</header>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://ikrtujbbefdiierxfbbm.supabase.co/storage/v1/object/public/profiles/RN%20LOGO%20TRANSPARENT.png" alt="Recruit Now Singapore" style="height:72px;width:auto;object-fit:contain"/>
      <div class="login-title">Recruit Now Singapore</div>
      <div class="login-sub">Resume Processing Portal</div>
    </div>

    <div class="alert alert-error" id="login-err" style="display:none"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@recruitnow.sg" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>

    <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div class="footer">Recruit Now Singapore Pte Ltd &nbsp;·&nbsp; Business reg. no.: 202139763E &nbsp;·&nbsp; License no.: 21C0845</div>

<script>
const SUPABASE_URL  = 'https://ikrtujbbefdiierxfbbm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrcnR1amJiZWZkaWllcnhmYmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mzk4NTUsImV4cCI6MjA5MTIxNTg1NX0.7a7WLB2grU9RZ7qP7_JkJGRNXqiTBPCW9UR3fSyspu0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Redirect if already logged in
const saved = localStorage.getItem('rn_user');
if (saved) window.location.href = 'app.html';

async function hashPassword(pass) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');
  err.style.display = 'none';
  if (!email || !pass) { err.textContent = 'Please enter your email and password.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const hash = await hashPassword(pass);
    const { data, error } = await sb.from('recruiters')
      .select('id,name,email,role,active')
      .eq('email', email)
      .eq('password_hash', hash)
      .single();
    if (error || !data) throw new Error('Invalid email or password.');
    if (data.active === false) throw new Error('Your account has been suspended. Please contact your administrator.');
    // Save user to sessionStorage and redirect
    localStorage.setItem('rn_user', JSON.stringify(data));
    window.location.href = 'app.html';
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}
</script>
</body>
</html>
